<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Aircraft Database</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <h1>Aircraft Database</h1>
    <div class="controls">
      <div class="controls-row">
        <input
          type="text"
          id="searchInput"
          placeholder="Search aircraft..."
        >
        <select id="sortColumn">
          <option value="">No Sort</option>
        </select>
        <select id="sortDirection">
          <option value="ASC">Ascending</option>
          <option value="DESC">Descending</option>
        </select>
        <button onclick="fetchData()">Search</button>
      </div>
      <div class="controls-scope">
        <label for="tableScope" class="scope-label">Looking in</label>
        <select id="tableScope" class="scope-select">
          <option value="models">Aircraft models</option>
          <option value="aircraft">Individual aircraft</option>
          <option value="manufacturers">Manufacturers</option>
        </select>
      </div>
    </div>
    <table id="resultsTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div
      id="error"
      class="error"
    ></div>
    <script src="/static/script.js"></script>
  </body>
</html>
